<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kerenyes Chicken</title>
    
    <!-- CSS & Framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #121212;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Navbar Style */
        .navbar { background-color: #000000; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .navbar-brand { font-weight: 800; letter-spacing: 0.5px; }
        .nav-link { font-size: 0.95rem; transition: color 0.3s; }
        .nav-link:hover { color: #ffca28 !important; }

        /* Auth Section */
        .auth-section {
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #121212;
            padding: 80px 20px;
        }
        
        .auth-card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .form-control-dark {
            background: #252525;
            border: 1px solid #444;
            color: white;
            padding: 12px 15px;
            border-radius: 10px;
        }
        
        .form-control-dark:focus {
            background: #2a2a2a;
            color: white;
            border-color: #ffca28;
            box-shadow: none;
        }

        .btn-auth {
            background: #ffca28;
            color: #000;
            font-weight: bold;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            transition: 0.3s;
            border: none;
        }

        .btn-auth:hover { background: #e5b624; transform: translateY(-2px); }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark py-3 fixed-top">
        <div class="container">
            <a class="navbar-brand text-white" href="home.html">
                KERENYES<span style="color: #ffca28;">CHICKEN</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto gap-lg-4 fw-semibold">
                    <li class="nav-item"><a class="nav-link text-white" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="tentang.html">Tentang</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="kontak.html">Kontak</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-card" data-aos="zoom-in">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-white">Selamat Datang</h3>
                <p class="text-secondary small">Silakan login untuk melanjutkan pemesanan</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="text-secondary small mb-1">Email</label>
                    <input type="email" id="email" class="form-control form-control-dark" placeholder="nama@email.com" required>
                </div>
                <div class="mb-4">
                    <label class="text-secondary small mb-1">Password</label>
                    <input type="password" id="password" class="form-control form-control-dark" placeholder="******" required>
                </div>
                <button type="button" class="btn btn-auth" onclick="prosesLogin()">MASUK</button>
            </form>

            <div class="text-center mt-4">
                <small class="text-secondary">Belum punya akun? <a href="register.html" class="text-warning text-decoration-none fw-bold">Daftar Sekarang</a></small>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-4 text-center" style="background-color: #050505; border-top: 1px solid #1a1a1a;">
        <p class="text-secondary mb-0">&copy; 2026 Kerenyes Chicken. All Rights Reserved.</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script> 
        AOS.init({ once: true }); 
        
        function prosesLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(!email || !password) {
                Swal.fire({
                    icon: 'error',
                    title: 'Login Gagal',
                    text: 'Email dan Password wajib diisi!',
                    background: '#1e1e1e', color: '#fff', confirmButtonColor: '#ffca28'
                });
                return;
            }

            // Simulasi Login Sukses
            Swal.fire({
                icon: 'success',
                title: 'Berhasil Login',
                text: 'Selamat datang kembali!',
                showConfirmButton: false,
                timer: 1500,
                background: '#1e1e1e', color: '#fff'
            }).then(() => {
                window.location.href = 'home.html';
            });
        }
    </script>
</body>
</html>
